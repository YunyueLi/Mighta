<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 940" font-family="'Inter','SF Pro Text',system-ui,sans-serif" role="img" aria-label="fork anatomy">
  <defs>
    <marker id="arrow-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto-start-reverse">
      <path d="M0,2 L10,6 L0,10 z" fill="#908778"/>
    </marker>
    <marker id="arrow-accent-dark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto-start-reverse">
      <path d="M0,2 L10,6 L0,10 z" fill="#c9a35a"/>
    </marker>
    <pattern id="paper-dark" x="0" y="0" width="220" height="220" patternUnits="userSpaceOnUse">
      <rect width="220" height="220" fill="#0c0a08"/>
      <circle cx="40" cy="60" r="0.6" fill="#4d4639" opacity="0.18"/>
      <circle cx="160" cy="30" r="0.5" fill="#4d4639" opacity="0.14"/>
      <circle cx="100" cy="170" r="0.7" fill="#4d4639" opacity="0.20"/>
      <circle cx="190" cy="120" r="0.4" fill="#4d4639" opacity="0.10"/>
      <circle cx="20" cy="190" r="0.5" fill="#4d4639" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1600" height="940" fill="url(#paper-dark)"/>
  
    <g>
      <text x="800" y="58" text-anchor="middle" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="11" font-weight="600" letter-spacing="3.2" fill="#c9a35a">fork · anatomy</text>
      <text x="800" y="102" text-anchor="middle" font-family="'Fraunces','EB Garamond',Georgia,serif" font-size="28" font-weight="500" fill="#f3ede0">what a single life looks like</text>
      <text x="800" y="132" text-anchor="middle" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="13" fill="#908778">five parts · one vibe · ageable from 19 to 80 in three sentences</text>
      <line x1="740" y1="150" x2="860" y2="150" stroke="#c9a35a" stroke-width="1" opacity="0.6"/>
    </g>
  
    <g>
      
    <text x="110" y="200" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="2.2" fill="#c9a35a">schema · ForkVersion</text>
    <line x1="264" y1="196" x2="710" y2="196" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
  
      <rect x="110" y="230" width="600" height="480" rx="14" ry="14" fill="#16120d" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
      
        <g>
          <text x="138" y="280" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.8" fill="#908778">01</text>
          <text x="180" y="280" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#c9a35a">divergence</text>
          <text x="682" y="280" text-anchor="end" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#908778">{ age, event }</text>
          <text x="180" y="302" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">the moment it forked</text>
          <line x1="138" y1="326" x2="682" y2="326" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
        </g>
        <g>
          <text x="138" y="368" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.8" fill="#908778">02</text>
          <text x="180" y="368" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#f3ede0">alternative</text>
          <text x="682" y="368" text-anchor="end" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#908778">string</text>
          <text x="180" y="390" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">the road not taken</text>
          <line x1="138" y1="414" x2="682" y2="414" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
        </g>
        <g>
          <text x="138" y="456" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.8" fill="#908778">03</text>
          <text x="180" y="456" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#f3ede0">trajectory</text>
          <text x="682" y="456" text-anchor="end" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#908778">TrajectoryNode[]</text>
          <text x="180" y="478" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">3–5 ages along the new road</text>
          <line x1="138" y1="502" x2="682" y2="502" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
        </g>
        <g>
          <text x="138" y="544" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.8" fill="#908778">04</text>
          <text x="180" y="544" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#f3ede0">outcome</text>
          <text x="682" y="544" text-anchor="end" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#908778">string</text>
          <text x="180" y="566" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">where it ended</text>
          <line x1="138" y1="590" x2="682" y2="590" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
        </g>
        <g>
          <text x="138" y="632" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.8" fill="#908778">05</text>
          <text x="180" y="632" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#c8c0b0">vibe</text>
          <text x="682" y="632" text-anchor="end" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#908778">shine | ash | drift | quiet | burn</text>
          <text x="180" y="654" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">tints every render</text>
          
        </g>
    </g>
  
    <g>
      
    <text x="800" y="200" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="2.2" fill="#c9a35a">example · jobs · ash</text>
    <line x1="954" y1="196" x2="1490" y2="196" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
  
      <rect x="800" y="230" width="690" height="480" rx="14" ry="14" fill="#16120d" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
      <rect x="800" y="230" width="6" height="480" fill="#a89d8a"/>
      <text x="836" y="280" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="2" fill="#a89d8a">vibe · ash</text>

      <text x="836" y="316" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.6" fill="#908778">the moment</text>
      <text x="836" y="340" font-family="'Fraunces','EB Garamond',Georgia,serif" font-size="18" font-style="italic" fill="#f3ede0">"dropped out of Reed College after one semester"</text>
      <text x="836" y="364" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#908778">at age 17</text>

      <line x1="836" y1="386" x2="1454" y2="386" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>

      <text x="836" y="418" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.6" fill="#908778">you mighta</text>
      <text x="836" y="442" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="13" fill="#f3ede0">took the engineering job at Atari and stayed.</text>

      <text x="836" y="480" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.6" fill="#908778">the road</text>
      
        <g>
          <circle cx="850" cy="516" r="3" fill="#a89d8a"/>
          <text x="866" y="504" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#a89d8a">age 25</text>
          <text x="866" y="522" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">you ship the Lynx and become a respected hardware lead.</text>
        </g>
        <g>
          <circle cx="850" cy="560" r="3" fill="#a89d8a"/>
          <text x="866" y="548" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#a89d8a">age 32</text>
          <text x="866" y="566" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">after the crash, you leave Atari with options worth nothing.</text>
        </g>
        <g>
          <circle cx="850" cy="604" r="3" fill="#a89d8a"/>
          <text x="866" y="592" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="11" fill="#a89d8a">age 45</text>
          <text x="866" y="610" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">you consult for Sega, divorced, contemplative.</text>
        </g>

      <line x1="836" y1="638" x2="1454" y2="638" stroke="#a89d8a" stroke-width="1" opacity="0.6"/>

      <text x="836" y="664" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="9" font-weight="600" letter-spacing="1.6" fill="#908778">where it ended</text>
      <text x="836" y="688" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="13" fill="#f3ede0">you are a comfortable middle-class engineer.</text>
      <text x="836" y="706" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">Wozniak built Apple alone, and it is good but smaller.</text>
    </g>
  
    <g>
      
    <text x="110" y="746" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="2.2" fill="#c9a35a">five vibes · five lives</text>
    <line x1="285" y1="742" x2="1490" y2="742" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
  
      <rect x="110" y="770" width="1380" height="110" rx="14" ry="14" fill="#16120d" stroke="rgba(243,237,224,0.14)" stroke-width="1"/>
      
        <g>
          <rect x="138" y="800" width="34" height="6" rx="3" fill="#d4af66"/>
          <text x="138" y="834" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#d4af66">shine</text>
          <text x="138" y="856" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">the version that worked</text>
        </g>
        <g>
          <rect x="414" y="800" width="34" height="6" rx="3" fill="#a89d8a"/>
          <text x="414" y="834" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#a89d8a">ash</text>
          <text x="414" y="856" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">after the fire is out</text>
        </g>
        <g>
          <rect x="690" y="800" width="34" height="6" rx="3" fill="#8295a0"/>
          <text x="690" y="834" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#8295a0">drift</text>
          <text x="690" y="856" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">elsewhere, quietly</text>
        </g>
        <g>
          <rect x="966" y="800" width="34" height="6" rx="3" fill="#86987f"/>
          <text x="966" y="834" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#86987f">quiet</text>
          <text x="966" y="856" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">smaller, gentler</text>
        </g>
        <g>
          <rect x="1242" y="800" width="34" height="6" rx="3" fill="#c87a55"/>
          <text x="1242" y="834" font-family="'JetBrains Mono','SF Mono',ui-monospace,monospace" font-size="14" fill="#c87a55">burn</text>
          <text x="1242" y="856" font-family="'Inter','SF Pro Text',system-ui,sans-serif" font-size="12" fill="#c8c0b0">the version that broke</text>
        </g>
    </g>
  
</svg>